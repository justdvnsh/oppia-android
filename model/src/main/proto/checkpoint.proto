syntax = "proto3";

package model;

import "exploration.proto";

option java_package = "org.oppia.android.app.model";
option java_multiple_files = true;

message Checkpoint {
    repeated EphemeralState previousStates = 2;
}

message CheckpointDatabase {
  // Mapping from unique ID to profile.
  map<string, Checkpoint> checkpoints = 1;
}
